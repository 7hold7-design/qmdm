services:
  postgres:
    image: postgres:16-alpine
    container_name: qmdm-postgres
    environment:
      POSTGRES_DB: qmdm
      POSTGRES_USER: qmdm_user
      POSTGRES_PASSWORD: qmdm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qmdm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qmdm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qmdm-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qmdm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: qmdm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-qmdm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-qmdm123}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - qmdm-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: qmdm-mosquitto
    user: "1883:1883"  # Явно указываем UID:GID пользователя mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - qmdm-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qmdm-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/qmdm
      DB_USERNAME: qmdm_user
      DB_PASSWORD: qmdm_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-qmdm}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-qmdm123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-for-jwt-min-32-chars-long!}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - qmdm-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qmdm-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - qmdm-network
    restart: unless-stopped

networks:
  qmdm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
